# ── Nginx konfiguratsiyasi — POS Tizim ────────────────────────────────────
# /etc/nginx/sites-available/pos_tizim
#
# Yoqish uchun:
#   sudo ln -s /etc/nginx/sites-available/pos_tizim /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream pos_gunicorn {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # HTTPS ga yo'naltirish (SSL bo'lganda)
    # return 301 https://$host$request_uri;

    # ── Statik fayllar ─────────────────────────────────────
    location /static/ {
        alias /var/www/pos_tizim/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── API ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://pos_gunicorn;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # ── Admin ──────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://pos_gunicorn;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Admin faqat ichki tarmoqdan
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny  all;
    }

    # ── Frontend ───────────────────────────────────────────
    location / {
        proxy_pass         http://pos_gunicorn;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Security Headers ───────────────────────────────────
    add_header X-Frame-Options        "DENY"             always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection       "1; mode=block"   always;
    add_header Referrer-Policy        "same-origin"      always;

    # ── Gzip ───────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript;

    # ── Upload hajmi ───────────────────────────────────────
    client_max_body_size 10M;

    # ── Loglar ─────────────────────────────────────────────
    access_log /var/log/nginx/pos_tizim_access.log;
    error_log  /var/log/nginx/pos_tizim_error.log;
}

# ── Rate limiting zonasi (http blokida) ───────────────────
# Bu qatorni /etc/nginx/nginx.conf ichidagi http{} ga qo'shing:
# limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
